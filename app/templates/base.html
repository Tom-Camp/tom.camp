<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tom.Camp{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-white text-gray-900">

    <header class="border-b border-gray-200">
        <nav class="mx-auto max-w-5xl px-4 py-4 flex items-center justify-between">
            <a href="/" class="font-semibold text-lg tracking-tight">Tom.Camp</a>
            <ul class="flex gap-6 text-sm text-gray-600">
                {% block nav_items %}{% endblock %}
            </ul>
        </nav>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-200 mt-auto">
        <div class="mx-auto max-w-5xl px-4 py-6 text-sm text-gray-400">
            {% block footer %}Tom.Camp{% endblock %}
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
