<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Card -->
    <a
        class="group flex flex-col h-full bg-layer border border-layer-line hover:border-transparent hover:shadow-lg focus:outline-hidden focus:border-transparent focus:shadow-lg transition duration-300 rounded-xl p-5"
        href="{{ url_for('posts.read_post', slug=post.slug) }}">
        {% if post.image_url %}
            <div class="aspect-w-16 aspect-h-11">
                <img class="w-full object-cover rounded-xl" src="{{ url_for('static', filename=post.image_url) }}" alt="Post Image">
            </div>
        {% endif %}
        <div class="my-6">
            <h3 class="text-xl font-semibold text-foreground">
                {{ post.title }}
            </h3>
            <p class="mt-5 text-muted-foreground-2">
                {{ post.body[:150] }}...
            </p>
        </div>
    </a>
    <!-- End Card -->
</div>
